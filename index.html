<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PACK MASTER QUEST — The Raipur Wedding Saga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void:       #0b0624;
    --bg-panel:      #1a0b3d;
    --bg-panel-2:    #2a1458;
    --ink:           #fff6d5;
    --ink-dim:       #b8a7e8;
    --accent-pink:   #ff3b8b;
    --accent-gold:   #ffd93d;
    --accent-cyan:   #4cc9f0;
    --accent-green:  #2ed573;
    --accent-red:    #ff4757;
    --accent-purple: #9d4edd;
    --border-light:  #ffd93d;
    --border-dark:   #3a0d68;
    --shadow-hard:   4px 4px 0 #000;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg-void);
    color: var(--ink);
    font-family: 'VT323', monospace;
    font-size: 20px;
    overflow: hidden;
    -webkit-font-smoothing: none;
    image-rendering: pixelated;
  }

  body {
    background:
      radial-gradient(ellipse at top, #2a1458 0%, #0b0624 70%),
      var(--bg-void);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* CRT scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.15) 0px,
      rgba(0,0,0,0.15) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 999;
    mix-blend-mode: multiply;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
    z-index: 998;
  }

  /* Floating pixel stars */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    width: 3px;
    height: 3px;
    background: var(--ink);
    animation: twinkle 2s infinite;
    box-shadow: 0 0 4px var(--ink);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }

  #game {
    width: min(960px, 96vw);
    height: min(640px, 92vh);
    background: var(--bg-panel);
    border: 4px solid var(--border-light);
    box-shadow:
      0 0 0 4px #000,
      0 0 0 8px var(--border-dark),
      0 0 40px rgba(255, 217, 61, 0.3),
      inset 0 0 0 2px #000;
    position: relative;
    z-index: 1;
    overflow: hidden;
  }

  .screen {
    position: absolute;
    inset: 0;
    padding: 24px;
    display: flex;
    flex-direction: column;
    animation: fadeIn 0.4s steps(4);
  }
  .screen.hidden { display: none; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  h1, h2, h3, .pixel {
    font-family: 'Press Start 2P', monospace;
    letter-spacing: 1px;
  }

  /* === TITLE SCREEN === */
  #title-screen {
    align-items: center;
    justify-content: center;
    text-align: center;
    background:
      radial-gradient(ellipse at center, #2a1458 0%, transparent 70%),
      linear-gradient(180deg, #0b0624 0%, #1a0b3d 100%);
  }
  .title-main {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(20px, 4vw, 40px);
    color: var(--accent-gold);
    text-shadow:
      3px 3px 0 var(--accent-pink),
      6px 6px 0 #000;
    line-height: 1.4;
    margin-bottom: 12px;
    animation: titleBob 2s ease-in-out infinite;
  }
  .title-sub {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 1.4vw, 14px);
    color: var(--accent-cyan);
    margin-bottom: 28px;
    text-shadow: 2px 2px 0 #000;
  }
  @keyframes titleBob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .title-art {
    font-size: clamp(56px, 12vw, 110px);
    margin-bottom: 20px;
    filter: drop-shadow(4px 4px 0 #000);
    animation: titleBob 2.6s ease-in-out infinite;
  }
  .press-start {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--ink);
    margin-top: 16px;
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
  .credits {
    font-size: 18px;
    color: var(--ink-dim);
    margin-top: 20px;
  }

  /* === CHARACTER SELECT === */
  #character-screen {
    align-items: center;
    gap: 18px;
  }
  .panel-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 18px;
    color: var(--accent-gold);
    text-shadow: 2px 2px 0 var(--accent-pink), 4px 4px 0 #000;
    margin-bottom: 8px;
  }
  .panel-sub {
    font-size: 20px;
    color: var(--ink-dim);
    margin-bottom: 10px;
  }
  .character-row {
    display: flex;
    gap: 18px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .char-card {
    background: var(--bg-panel-2);
    border: 3px solid var(--border-dark);
    padding: 16px 14px;
    width: 200px;
    cursor: pointer;
    transition: transform 0.1s steps(2);
    text-align: center;
    box-shadow: var(--shadow-hard);
  }
  .char-card:hover, .char-card.selected {
    border-color: var(--accent-gold);
    transform: translate(-2px, -2px);
    background: var(--bg-panel);
  }
  .char-card.selected {
    box-shadow: 6px 6px 0 var(--accent-pink);
  }
  .char-sprite {
    font-size: 76px;
    line-height: 1;
    filter: drop-shadow(3px 3px 0 #000);
    animation: spriteBob 1.4s ease-in-out infinite;
  }
  @keyframes spriteBob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  .char-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: var(--accent-gold);
    margin: 10px 0 6px;
  }
  .char-class {
    font-size: 16px;
    color: var(--ink-dim);
    line-height: 1.2;
  }
  .char-bonus {
    font-size: 14px;
    color: var(--accent-cyan);
    margin-top: 8px;
  }

  /* === BUTTONS === */
  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    background: var(--accent-pink);
    color: var(--ink);
    border: 3px solid #000;
    padding: 12px 22px;
    cursor: pointer;
    box-shadow: 4px 4px 0 #000;
    transition: all 0.06s steps(2);
    text-transform: uppercase;
  }
  .btn:hover:not(:disabled) {
    background: var(--accent-gold);
    color: #000;
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 #000;
  }
  .btn:active {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 #000;
  }
  .btn:disabled {
    background: #555;
    color: #999;
    cursor: not-allowed;
    box-shadow: 4px 4px 0 #000;
  }
  .btn-secondary { background: var(--accent-cyan); color: #000; }
  .btn-secondary:hover:not(:disabled) { background: var(--accent-gold); }
  .btn-danger { background: var(--accent-red); }

  /* === HUD === */
  #hud {
    display: none;
    align-items: center;
    gap: 14px;
    padding: 10px 14px;
    background: var(--bg-panel-2);
    border: 3px solid var(--border-dark);
    box-shadow: var(--shadow-hard);
    margin-bottom: 14px;
  }
  #hud.visible { display: flex; }
  .hud-avatar {
    font-size: 36px;
    filter: drop-shadow(2px 2px 0 #000);
    animation: spriteBob 1.4s ease-in-out infinite;
  }
  .hud-info { flex: 1; min-width: 0; }
  .hud-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: var(--accent-gold);
    margin-bottom: 4px;
  }
  .hud-level {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--ink-dim);
    margin-bottom: 6px;
  }
  .bar-container {
    height: 14px;
    background: #000;
    border: 2px solid var(--border-dark);
    position: relative;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan));
    transition: width 0.4s steps(12);
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.3);
  }
  .bar-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: #fff;
    text-shadow: 1px 1px 0 #000;
  }
  .hud-right { text-align: right; }
  .hud-right-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--ink-dim);
    margin-bottom: 4px;
  }
  .hud-right-val {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--accent-gold);
  }

  /* === MAP === */
  #map-screen { padding: 18px 22px; }
  .map-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .map-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--accent-gold);
    text-shadow: 2px 2px 0 #000;
  }
  .map-sub {
    font-size: 16px;
    color: var(--ink-dim);
  }
  .map-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    overflow-y: auto;
    padding: 4px;
    align-content: start;
  }
  .quest-node {
    background: var(--bg-panel-2);
    border: 3px solid var(--border-dark);
    padding: 14px 10px;
    cursor: pointer;
    text-align: center;
    box-shadow: var(--shadow-hard);
    position: relative;
    transition: all 0.1s steps(2);
    min-height: 130px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .quest-node:hover {
    border-color: var(--accent-gold);
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 #000;
  }
  .quest-node.complete {
    border-color: var(--accent-green);
    background: linear-gradient(135deg, #0d3b1a 0%, var(--bg-panel-2) 100%);
  }
  .quest-node .star-badge {
    position: absolute;
    top: 4px;
    right: 6px;
    color: var(--accent-gold);
    font-size: 22px;
    text-shadow: 2px 2px 0 #000;
    animation: spriteBob 1.8s ease-in-out infinite;
    display: none;
  }
  .quest-node.complete .star-badge { display: block; }
  .quest-icon {
    font-size: 40px;
    filter: drop-shadow(2px 2px 0 #000);
    margin-bottom: 4px;
  }
  .quest-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--ink);
    line-height: 1.4;
    margin-bottom: 4px;
  }
  .quest-progress {
    font-size: 15px;
    color: var(--accent-cyan);
  }
  .quest-node.complete .quest-progress { color: var(--accent-green); }

  .route-banner {
    background: #000;
    border: 3px solid var(--accent-cyan);
    padding: 8px 14px;
    margin-top: 10px;
    font-size: 17px;
    color: var(--accent-cyan);
    text-align: center;
    font-family: 'VT323', monospace;
    letter-spacing: 1px;
  }
  .route-banner .city { color: var(--accent-gold); }

  /* === QUEST SCREEN === */
  #quest-screen { padding: 18px 22px; }
  .quest-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    gap: 10px;
  }
  .quest-title-box {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    min-width: 0;
  }
  .quest-title-icon { font-size: 36px; filter: drop-shadow(2px 2px 0 #000); }
  .quest-title-text h2 {
    font-size: 14px;
    color: var(--accent-gold);
    text-shadow: 2px 2px 0 #000;
    line-height: 1.2;
  }
  .quest-title-text p {
    font-size: 17px;
    color: var(--ink-dim);
    margin-top: 4px;
  }
  .item-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 10px 6px 6px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .item-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: var(--bg-panel-2);
    border: 2px solid var(--border-dark);
    cursor: pointer;
    transition: all 0.08s steps(2);
    box-shadow: 3px 3px 0 #000;
  }
  .item-row:hover {
    border-color: var(--accent-cyan);
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 #000;
  }
  .item-row.checked {
    background: linear-gradient(90deg, #0d3b1a 0%, var(--bg-panel-2) 100%);
    border-color: var(--accent-green);
  }
  .item-row.checked .item-label { text-decoration: line-through; color: var(--ink-dim); }
  .check-box {
    width: 22px;
    height: 22px;
    border: 2px solid var(--accent-gold);
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--accent-green);
    font-weight: bold;
    font-size: 16px;
  }
  .item-row.checked .check-box {
    background: var(--accent-green);
    border-color: var(--accent-green);
    color: #000;
  }
  .item-icon {
    font-size: 24px;
    flex-shrink: 0;
    width: 30px;
    text-align: center;
  }
  .item-label { flex: 1; font-size: 19px; line-height: 1.2; }
  .item-tag {
    font-size: 14px;
    color: var(--accent-pink);
    padding: 2px 6px;
    border: 1px solid var(--accent-pink);
    flex-shrink: 0;
  }
  .item-row.gender-male .item-tag { color: var(--accent-cyan); border-color: var(--accent-cyan); }
  .item-row.gender-female .item-tag { color: var(--accent-pink); border-color: var(--accent-pink); }

  .quest-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    gap: 10px;
  }
  .quest-bar {
    flex: 1;
    height: 18px;
    background: #000;
    border: 2px solid var(--accent-gold);
    position: relative;
  }
  .quest-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-pink), var(--accent-gold));
    transition: width 0.4s steps(12);
  }
  .quest-bar-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: #fff;
    text-shadow: 1px 1px 0 #000;
  }

  /* === VICTORY === */
  #victory-screen {
    align-items: center;
    justify-content: center;
    text-align: center;
    background:
      radial-gradient(ellipse at center, #3a1a5a 0%, transparent 70%),
      linear-gradient(180deg, #1a0b3d 0%, #0b0624 100%);
  }
  .victory-art { font-size: 100px; animation: spriteBob 1.2s ease-in-out infinite; filter: drop-shadow(4px 4px 0 #000); }
  .victory-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 24px;
    color: var(--accent-gold);
    margin: 16px 0 8px;
    text-shadow: 3px 3px 0 var(--accent-pink), 6px 6px 0 #000;
  }
  .victory-sub {
    font-size: 22px;
    color: var(--accent-cyan);
    margin-bottom: 8px;
  }
  .victory-stats {
    background: var(--bg-panel-2);
    border: 3px solid var(--accent-gold);
    padding: 16px 24px;
    margin: 16px 0;
    font-size: 18px;
    line-height: 1.6;
    box-shadow: var(--shadow-hard);
    min-width: 360px;
    text-align: left;
  }
  .victory-stats .label { color: var(--ink-dim); }
  .victory-stats .val { color: var(--accent-gold); }
  .victory-footer {
    color: var(--accent-pink);
    margin-top: 10px;
    text-align: center;
  }
  .victory-fine {
    font-size: 15px;
    margin-top: 6px;
    text-align: center;
    color: var(--ink);
  }

  /* === TOAST === */
  #toast {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--bg-panel-2);
    border: 4px solid var(--accent-gold);
    padding: 20px 32px;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s steps(3);
    z-index: 50;
    box-shadow: 0 0 0 4px #000, 0 0 30px rgba(255, 217, 61, 0.6);
    min-width: 280px;
  }
  #toast.show { opacity: 1; animation: toastPop 0.3s steps(3); }
  @keyframes toastPop {
    0%   { transform: translate(-50%, -50%) scale(0.5); }
    60%  { transform: translate(-50%, -50%) scale(1.1); }
    100% { transform: translate(-50%, -50%) scale(1); }
  }
  .toast-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--accent-gold);
    margin-bottom: 8px;
    text-shadow: 2px 2px 0 #000;
  }
  .toast-body {
    font-size: 20px;
    color: var(--ink);
    line-height: 1.3;
  }
  .toast-icon { font-size: 40px; margin-bottom: 6px; }

  /* === DIALOGUE === */
  .dialogue-box {
    background: #000;
    border: 3px solid var(--accent-cyan);
    padding: 10px 14px;
    margin-bottom: 10px;
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: var(--ink);
    position: relative;
    box-shadow: var(--shadow-hard);
  }
  .dialogue-box::after {
    content: '▼';
    position: absolute;
    bottom: 4px;
    right: 10px;
    color: var(--accent-cyan);
    animation: blink 1s steps(2) infinite;
    font-size: 14px;
  }

  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg-panel); }
  ::-webkit-scrollbar-thumb { background: var(--accent-purple); border: 2px solid #000; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent-gold); }

  .reset-link {
    position: absolute;
    bottom: 10px;
    right: 14px;
    font-size: 14px;
    color: var(--ink-dim);
    cursor: pointer;
    text-decoration: underline;
    z-index: 5;
  }
  .reset-link:hover { color: var(--accent-red); }

  .mute-btn {
    position: absolute;
    top: 10px;
    right: 14px;
    background: transparent;
    border: 2px solid var(--border-dark);
    color: var(--ink-dim);
    padding: 4px 8px;
    font-size: 16px;
    cursor: pointer;
    font-family: 'Press Start 2P', monospace;
  }
  .mute-btn:hover { border-color: var(--accent-gold); color: var(--accent-gold); }

  .button-row {
    display: flex;
    gap: 12px;
    margin-top: 18px;
  }

  @media (max-width: 720px) {
    .map-grid { grid-template-columns: repeat(2, 1fr); }
    .character-row { gap: 10px; }
    .char-card { width: 150px; padding: 12px 8px; }
    .char-sprite { font-size: 56px; }
  }
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<div id="game"></div>

<script>
/* =========================================================
   PACK MASTER QUEST  — The Raipur Wedding Saga
   Self-contained retro RPG checklist. All DOM built safely
   with createElement/textContent (no innerHTML with data).
   ========================================================= */

const STORAGE_KEY = 'packmaster.raipur.v1';

/* ---------- DATA: Characters ---------- */
const CHARACTERS = [
  { id: 'groom',  sprite: '🤵', name: 'THE SHERWANI KNIGHT', class: 'Dressed in gold-threaded armor', bonus: '+ Pocket Square Mastery', gender: 'male'  },
  { id: 'bride',  sprite: '👰', name: 'THE LEHENGA MAGE',    class: 'Wields bangles and bindis',      bonus: '+ Infinite Dupatta Slot',  gender: 'female'},
  { id: 'rogue',  sprite: '🧑‍🎤', name: 'THE KURTA NOMAD',  class: 'Neutral path · any outfit',      bonus: '+ Flex Wardrobe',          gender: 'any'   },
];

/* ---------- DATA: Quests & Items ---------- */
const QUESTS = [
  {
    id: 'scrolls', icon: '📜', name: 'SCROLLS OF PASSAGE',
    sub: 'Gather the sacred documents — no ID, no journey.',
    dialogue: '"Halt, traveler! Show me thy papers before thou may pass the toll gates!"',
    items: [
      { id: 'dl',         label: "Driving License",             icon: '🪪' },
      { id: 'rc',         label: "Car RC Book",                 icon: '📄' },
      { id: 'insurance',  label: "Car Insurance (valid)",       icon: '🛡️' },
      { id: 'puc',        label: "PUC Certificate",             icon: '📃' },
      { id: 'fastag',     label: "FASTag (recharged ₹2000+)",   icon: '💳' },

/* ---------- STATE ---------- */
let state = {
  character: null,
  checked: {},
  xp: 0,
  level: 1,
  muted: false,
  _victoryShown: false,
};

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = Object.assign(state, JSON.parse(raw));
  } catch (e) {}
}

/* ---------- AUDIO ---------- */
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
}
function beep(freq, dur = 0.08, type = 'square', vol = 0.08) {
  if (state.muted || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}
const sfx = {
  select:    () => beep(520, 0.06),
  confirm:   () => { beep(660, 0.06); setTimeout(() => beep(880, 0.08), 60); },
  check:     () => { beep(880, 0.05); setTimeout(() => beep(1320, 0.06), 40); },
  uncheck:   () => beep(330, 0.08),
  levelup:   () => { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.12, 'square', 0.1), i * 90)); },
  victory:   () => { [523, 659, 784, 1047, 784, 1047, 1319].forEach((f, i) => setTimeout(() => beep(f, 0.18, 'square', 0.11), i * 130)); },
  questdone: () => { [659, 880, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.1, 'triangle', 0.1), i * 80)); },
  back:      () => beep(260, 0.08),
};

/* ---------- DOM HELPERS (no innerHTML with data) ---------- */
function el(tag, opts = {}, ...children) {
  const n = document.createElement(tag);
  if (opts.cls) n.className = opts.cls;
  if (opts.id) n.id = opts.id;
  if (opts.text != null) n.textContent = opts.text;
  if (opts.style) Object.assign(n.style, opts.style);
  if (opts.attrs) for (const k in opts.attrs) n.setAttribute(k, opts.attrs[k]);
  if (opts.on) for (const k in opts.on) n.addEventListener(k, opts.on[k]);
  for (const c of children) {
    if (c == null || c === false) continue;
    n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return n;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

/* ---------- PROGRESS HELPERS ---------- */
function visibleItemsForQuest(quest) {
  if (!state.character) return quest.items;
  const g = CHARACTERS.find(c => c.id === state.character).gender;
  if (g === 'any') return quest.items;
  return quest.items.filter(it => !it.gender || it.gender === g);
}
function questProgress(quest) {
  const items = visibleItemsForQuest(quest);
  const done = items.filter(it => state.checked[it.id]).length;
  return { done, total: items.length };
}
function totalProgress() {
  let done = 0, total = 0;
  QUESTS.forEach(q => { const p = questProgress(q); done += p.done; total += p.total; });
  return { done, total };
}

/* ---------- XP ---------- */
function gainXP(amount) {
  state.xp += amount;
  let leveled = false;
  while (state.xp >= state.level * 100) {
    state.xp -= state.level * 100;
    state.level++;
    leveled = true;
  }
  if (leveled) {
    sfx.levelup();
    showToast('⭐', 'LEVEL UP!', 'You reached Level ' + state.level);
  }
  saveState();
}
function loseXP(amount) {
  state.xp = Math.max(0, state.xp - amount);
  saveState();
}

/* ---------- TOAST ---------- */
let toastTimer = null;
function showToast(icon, title, body) {
  const toast = document.getElementById('toast');
  if (!toast) return;
  toast.querySelector('.toast-icon').textContent = icon;
  toast.querySelector('.toast-title').textContent = title;
  toast.querySelector('.toast-body').textContent = body;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

/* ---------- SCREEN BUILDERS ---------- */
const gameRoot = document.getElementById('game');
let currentScreen = null;

function mountScreen(buildFn) {
  clear(gameRoot);
  currentScreen = buildFn();
  gameRoot.appendChild(currentScreen);
  // Persistent toast + reset link live inside game
  gameRoot.appendChild(buildToast());
  gameRoot.appendChild(buildResetLink());
}

function buildToast() {
  return el('div', { id: 'toast' },
    el('div', { cls: 'toast-icon', text: '⭐' }),
    el('div', { cls: 'toast-title', text: '' }),
    el('div', { cls: 'toast-body',  text: '' }),

}

function buildResetLink() {
  return el('div', {
    cls: 'reset-link',
    text: '[reset save]',
    on: { click: () => {
      if (confirm('Reset all saved progress?')) {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();

}

  const screen = el('div', { cls: 'screen', id: 'title-screen' },

    el('div', { cls: 'title-art', text: '🎮👰🤵' }),

  return screen;
}

/* ===== CHARACTER SELECT ===== */
function buildCharacterScreen() {
  let selectedId = state.character || null;

  const row = el('div', { cls: 'character-row' });
  const cards = [];

  CHARACTERS.forEach(c => {
    const card = el('div', { cls: 'char-card' + (selectedId === c.id ? ' selected' : '') },
      el('div', { cls: 'char-sprite', text: c.sprite }),
      el('div', { cls: 'char-name',   text: c.name }),
      el('div', { cls: 'char-class',  text: c.class }),
      el('div', { cls: 'char-bonus',  text: c.bonus }),
    );
    card.addEventListener('click', () => {
      sfx.select();
      selectedId = c.id;
      cards.forEach(x => x.classList.remove('selected'));
      card.classList.add('selected');
      confirmBtn.disabled = false;
    });
    cards.push(card);
    row.appendChild(card);
  });

  const backBtn = el('button', {
    cls: 'btn btn-secondary',
    text: '◀ BACK',
    on: { click: () => { sfx.back(); mountScreen(buildTitleScreen); } },
  });
  const confirmBtn = el('button', {
    cls: 'btn',
    text: 'BEGIN QUEST ▶',
    attrs: {},
    on: { click: () => {
      if (!selectedId) return;
      sfx.confirm();
      state.character = selectedId;
      saveState();
      mountScreen(buildMapScreen);
    }},
  });
  confirmBtn.disabled = !selectedId;

  return el('div', { cls: 'screen', id: 'character-screen' },
    el('div', { cls: 'panel-title', text: '⚔ CHOOSE YOUR HERO ⚔' }),
    el('div', { cls: 'panel-sub',   text: 'Your class determines your quest wardrobe' }),
    row,
    el('div', { cls: 'button-row' }, backBtn, confirmBtn),
  );
}

/* ===== HUD ===== */
function buildHUD() {
  const char = CHARACTERS.find(c => c.id === state.character);
  const xpNeeded = state.level * 100;
  const pct = Math.min(100, (state.xp / xpNeeded) * 100);
  const tp = totalProgress();

  const barFill = el('div', { cls: 'bar-fill', style: { width: pct + '%' } });
  const barLabel = el('div', { cls: 'bar-label', text: state.xp + ' / ' + xpNeeded + ' XP' });

  return el('div', { cls: 'hud visible', id: 'hud' },
    el('div', { cls: 'hud-avatar', text: char ? char.sprite : '🤵' }),
    el('div', { cls: 'hud-info' },
      el('div', { cls: 'hud-name',  text: char ? char.name : 'HERO' }),
      el('div', { cls: 'hud-level', text: 'LV ' + state.level + '  ·  XP ' + state.xp + '/' + xpNeeded }),
      el('div', { cls: 'bar-container' }, barFill, barLabel),
    ),
    el('div', { cls: 'hud-right' },
      el('div', { cls: 'hud-right-label', text: 'TOTAL PACKED' }),
      el('div', { cls: 'hud-right-val',   text: tp.done + ' / ' + tp.total }),
    ),
  );
}

/* ===== MAP ===== */
function buildMapScreen() {
  const grid = el('div', { cls: 'map-grid' });

  QUESTS.forEach(q => {
    const { done, total } = questProgress(q);
    const complete = done === total && total > 0;
    const node = el('div', { cls: 'quest-node' + (complete ? ' complete' : '') },
      el('div', { cls: 'star-badge', text: '★' }),
      el('div', { cls: 'quest-icon', text: q.icon }),
      el('div', { cls: 'quest-name', text: q.name }),
      el('div', { cls: 'quest-progress', text: done + ' / ' + total }),
    );
    node.addEventListener('click', () => {
      sfx.select();
      mountScreen(() => buildQuestScreen(q.id));
    });
    grid.appendChild(node);
  });

  const routeBanner = el('div', { cls: 'route-banner' },
    document.createTextNode('ROUTE: '),
    el('span', { cls: 'city', text: 'BANGALORE' }),
    document.createTextNode(' ▶ HYDERABAD ▶ NAGPUR ▶ '),
    el('span', { cls: 'city', text: 'RAIPUR' }),
  );

  const screen = el('div', { cls: 'screen', id: 'map-screen' },
    buildHUD(),
    el('div', { cls: 'map-header' },
      el('div', { cls: 'map-title', text: '⭐ WORLD MAP ⭐' }),
      el('div', { cls: 'map-sub', text: 'Select a quest zone' }),
    ),
    grid,
    routeBanner,
  );

  // Check for victory trigger
  const tp = totalProgress();
  if (tp.done === tp.total && tp.total > 0 && !state._victoryShown) {
    state._victoryShown = true;
    saveState();
    setTimeout(() => mountScreen(buildVictoryScreen), 600);
  } else if (tp.done < tp.total && state._victoryShown) {
    state._victoryShown = false;
    saveState();
  }

  return screen;
}

/* ===== QUEST DETAIL ===== */
function buildQuestScreen(questId) {
  const quest = QUESTS.find(q => q.id === questId);
  if (!quest) return buildMapScreen();

  const list = el('div', { cls: 'item-list' });
  const items = visibleItemsForQuest(quest);

  const barFill  = el('div', { cls: 'quest-bar-fill' });
  const barLabel = el('div', { cls: 'quest-bar-label' });

  function updateFooter() {
    const { done, total } = questProgress(quest);
    const p = total ? (done / total) * 100 : 0;
    barFill.style.width = p + '%';
    barLabel.textContent = done + ' / ' + total + '  (' + Math.round(p) + '%)';
  }

  items.forEach(it => {
    const checked = !!state.checked[it.id];
    const check = el('div', { cls: 'check-box', text: checked ? '✓' : '' });
    const icon  = el('div', { cls: 'item-icon', text: it.icon });
    const label = el('div', { cls: 'item-label', text: it.label });
    const rowChildren = [check, icon, label];
    if (it.gender) {
      rowChildren.push(el('div', { cls: 'item-tag', text: it.gender === 'male' ? '♂' : '♀' }));
    }
    const rowCls = 'item-row' + (checked ? ' checked' : '') + (it.gender ? ' gender-' + it.gender : '');
    const row = el('div', { cls: rowCls }, ...rowChildren);

    row.addEventListener('click', () => {
      const wasChecked = !!state.checked[it.id];
      if (wasChecked) {
        delete state.checked[it.id];
        row.classList.remove('checked');
        check.textContent = '';
        sfx.uncheck();
        loseXP(10);
      } else {
        state.checked[it.id] = true;
        row.classList.add('checked');
        check.textContent = '✓';
        sfx.check();
        gainXP(10);
      }
      saveState();
      updateFooter();

      // Refresh HUD bars (in place)
      refreshHUDInPlace();

      const { done, total } = questProgress(quest);
      if (!wasChecked && done === total) {
        sfx.questdone();
        showToast(quest.icon, 'QUEST CLEARED!', quest.name + ' ★');
      }
    });
    list.appendChild(row);
  });

  const backBtn = el('button', {
    cls: 'btn btn-secondary',
    text: '◀ MAP',
    on: { click: () => { sfx.back(); mountScreen(buildMapScreen); } },
  });

  const screen = el('div', { cls: 'screen', id: 'quest-screen' },
    el('div', { cls: 'quest-header' },
      el('div', { cls: 'quest-title-box' },
        el('div', { cls: 'quest-title-icon', text: quest.icon }),
        el('div', { cls: 'quest-title-text' },
          el('h2', { text: quest.name }),
          el('p',  { text: quest.sub }),
        ),
      ),
      backBtn,
    ),
    el('div', { cls: 'dialogue-box', text: quest.dialogue }),
    list,
    el('div', { cls: 'quest-footer' },
      el('div', { cls: 'quest-bar' }, barFill, barLabel),
    ),
  );

  updateFooter();
  return screen;
}

/* Refresh HUD bars without rebuilding the whole screen */
function refreshHUDInPlace() {
  // For quest screen, there's no HUD. For map screen, the HUD is rebuilt on re-mount.
  // Nothing to do here at the moment — HUD refreshes on screen change.
}

/* ===== VICTORY ===== */
function buildVictoryScreen() {
  sfx.victory();
  const tp = totalProgress();
  const char = CHARACTERS.find(c => c.id === state.character);
  const totalXP = ((state.level - 1) * 100) + state.xp;

  const stats = el('div', { cls: 'victory-stats' },
    el('div', {},
      el('span', { cls: 'label', text: 'Hero: ' }),
      el('span', { cls: 'val',   text: (char ? char.sprite + ' ' + char.name : 'HERO') }),
    ),
    el('div', {},
      el('span', { cls: 'label', text: 'Items packed: ' }),
      el('span', { cls: 'val',   text: tp.done + ' / ' + tp.total }),
    ),
    el('div', {},
      el('span', { cls: 'label', text: 'Final Level: ' }),
      el('span', { cls: 'val',   text: 'LV ' + state.level }),
    ),
    el('div', {},
      el('span', { cls: 'label', text: 'Total XP: ' }),
      el('span', { cls: 'val',   text: String(totalXP) }),
    ),
    el('div', { cls: 'victory-footer', text: 'BANGALORE ➜ RAIPUR ➜ ✨' }),
    el('div', { cls: 'victory-fine',   text: "Drive safe. Dance hard. Don't forget the shagun." }),
  );

  const mapBtn = el('button', {
    cls: 'btn btn-secondary',
    text: '◀ WORLD MAP',
    on: { click: () => { sfx.back(); mountScreen(buildMapScreen); } },
  });
  const resetBtn = el('button', {
    cls: 'btn btn-danger',
    text: 'NEW GAME+',
    on: { click: () => {
      if (confirm('Start a new game? Your progress will be cleared.')) {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
      }
    }},
  });

  return el('div', { cls: 'screen', id: 'victory-screen' },
    el('div', { cls: 'victory-art', text: '🏆' }),
    el('h1',  { cls: 'victory-title', text: 'QUEST COMPLETE!' }),
    el('div', { cls: 'victory-sub',   text: 'You have packed for the wedding of legends' }),
    stats,
    el('div', { cls: 'button-row' }, mapBtn, resetBtn),
  );
}

/* ===== STARS ===== */
function initStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 50; i++) {
    const s = el('div', {
      cls: 'star',
      style: {
        left: (Math.random() * 100) + '%',
        top:  (Math.random() * 100) + '%',
        animationDelay: (Math.random() * 2) + 's',
      },
    });
    container.appendChild(s);
  }
}

/* ===== BOOT ===== */
function boot() {
  loadState();
  initStars();
  mountScreen(buildTitleScreen);
}
boot();
</script>
